version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: saas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: saas-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"

  reporting-service:
    build:
      context: ./apps/reporting-service
      dockerfile: Dockerfile
    container_name: saas-reporting
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS}
      REPORTING_API_KEY: ${REPORTING_API_KEY}
    ports:
      - "${REPORTING_PORT}:8080"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: saas-api
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - reporting-service
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${API_PORT}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: ${POSTGRES_DB}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      REPORTING_BASE_URL: http://reporting-service:8080
      REPORTING_API_KEY: ${REPORTING_API_KEY}
    ports:
      - "${API_PORT}:4000"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: saas-web
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: 3000
      API_BASE_URL: http://api:4000/api
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
    ports:
      - "${WEB_PORT}:3000"

volumes:
  postgres_data:
